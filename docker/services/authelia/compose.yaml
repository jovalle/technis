services:
  authelia:
    cap_drop:
      - ALL
    container_name: authelia
    depends_on:
      tailscale:
        condition: service_healthy
        required: true
    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 256M
        reservations:
          memory: 64M
    environment:
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET:?AUTHELIA_SESSION_SECRET is required}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY=${AUTHELIA_STORAGE_ENCRYPTION_KEY:?AUTHELIA_STORAGE_ENCRYPTION_KEY is required}
      - DOMAIN=${AUTHELIA_DOMAIN:?AUTHELIA_DOMAIN is required}
      - IMMICH_CLIENT_SECRET_HASH=${AUTHELIA_IMMICH_CLIENT_SECRET_HASH:?AUTHELIA_IMMICH_CLIENT_SECRET_HASH is required}
      - JWT_SECRET=${AUTHELIA_JWT_SECRET:?AUTHELIA_JWT_SECRET is required}
      - TZ=${TZ:-America/New_York}
      - X_AUTHELIA_CONFIG_FILTERS=${AUTHELIA_X_AUTHELIA_CONFIG_FILTERS:?AUTHELIA_X_AUTHELIA_CONFIG_FILTERS is required}
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 30s
      test:
        - CMD
        - wget
        - -q
        - -O-
        - http://127.0.0.1:9091/api/health
      timeout: 10s
    hostname: authelia
    image: authelia/authelia:latest
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.authelia-canonical-host.redirectregex.permanent=true
      - traefik.http.middlewares.authelia-canonical-host.redirectregex.regex=^https://auth\.nexus\.techn\.is/?(.*)
      - traefik.http.middlewares.authelia-canonical-host.redirectregex.replacement=https://auth.techn.is/$1
      - traefik.http.routers.authelia.middlewares=authelia-canonical-host,external-bypass@file
      - traefik.http.routers.authelia.rule=Host(`auth.techn.is`) || Host(`auth.nexus.techn.is`)
      - traefik.http.services.authelia.loadbalancer.server.port=9091
    networks:
      - external
      - internal
    ports:
      - 100.100.1.1:9091:9091
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    user: 1000:1000
    volumes:
      - ${STACK_DATA_ROOT:?STACK_DATA_ROOT is required}/authelia:/config
