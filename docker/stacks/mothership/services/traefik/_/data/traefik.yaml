accessLog:
  bufferingSize: 100
  fields:
    defaultMode: keep
    headers:
      defaultMode: keep
      names:
        Authorization: drop
        CF-Connecting-IP: keep
        CF-IPCountry: keep
        Content-Type: keep
        User-Agent: keep
        X-Forwarded-For: keep
        X-Real-IP: keep
    names:
      ClientUsername: drop
  filePath: /var/log/traefik/access.log
  filters:
    minDuration: "10ms"
    retryAttempts: true
    statusCodes:
      - "200-599"
  format: common
api:
  dashboard: true
  insecure: true
certificatesResolvers:
  letsencrypt:
    acme:
      dnsChallenge:
        delayBeforeCheck: 10s
        provider: cloudflare
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"
      email: "admin@techn.is"
      storage: /etc/traefik/certs/acme.json
entryPoints:
  traefik:
    address: ":8080"
  web:
    address: ":80"
    forwardedHeaders:
      trustedIPs:
        - "173.245.48.0/20"
        - "103.21.244.0/22"
        - "103.22.200.0/22"
